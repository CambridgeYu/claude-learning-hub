        .progress-steps::before {

            top: 20px;
            left: 0;
            right: 0;
            height: 3px;
            background: #e0e0e0;
            z-index: 1;
        }
        .step {
            position: relative;
            z-index: 2;
            text-align: center;

        }
        .step-circle {

            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .step.active .step-circle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .step.completed .step-circle {
            background: #28a745;
            color: white;
        }
        .step-label {
            font-size: 0.9em;
            color: #666;
        }
        .step.active .step-label {
            color: #667eea;
            font-weight: 600;
        }
        
        .tutorial-panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;

            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tutorial-title {
            font-size: 1.8em;
            color: #333;
        }
        .step-counter {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #666;
        }
        
        .content-section {
            margin-bottom: 25px;
        }

            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .content-section p {
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
        }

            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            overflow-x: auto;
            margin: 15px 0;
            position: relative;

            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;

        .code-title {
            color: #667eea;
            font-size: 0.9em;
        }
        .copy-btn {
            background: #333;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;

        .code-content {

        .code-command { color: #569cd6; }

            margin: 0;

            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;

            color: #721c24;
        }
        .warning-box p {
            color: #721c24;
            margin: 0;
        }

            justify-content: space-between;
            margin-top: 30px;

            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;

                step.classList.remove('active', 'completed');
                if (index + 1 < currentStep) {
                    step.classList.add('completed');
                } else if (index + 1 === currentStep) {
                    step.classList.add('active');
                }
            });
        }

        }

            if (currentStep > 1) {
                currentStep--;
                renderStep(currentStep);
            }
        }
        
        // 复制代码
        function copyCode(btn) {
            const codeBlock = btn.closest('.code-block');
            const codeContent = codeBlock.querySelector('.code-content').innerText;
            
            navigator.clipboard.writeText(codeContent).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制');
            });
        }
