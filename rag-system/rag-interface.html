<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG System - 智能问答系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        .chat-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .chat-container {
            height: 500px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 10px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: #667eea;
            color: white;
            margin-left: 20%;
        }
        
        .message.ai {
            background: white;
            border: 1px solid #e0e0e0;
            margin-right: 20%;
        }
        
        .chat-input {
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .chat-input button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: opacity 0.3s;
        }
        
        .chat-input button:hover {
            opacity: 0.9;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .info-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .info-panel h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .source-item {
            padding: 10px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        
        .source-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .source-similarity {
            color: #667eea;
            font-size: 0.9em;
        }
        
        .chart-container {
            height: 250px;
            margin-top: 15px;
        }
        
        .settings-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .setting-item {
            margin-bottom: 15px;
        }
        
        .setting-item label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }
        
        .setting-item select,
        .setting-item input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 RAG System - 智能问答系统</h1>
            <p>基于检索增强生成的智能问答界面</p>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalQueries">1,234</div>
                <div class="stat-label">今日查询</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">98.5%</div>
                <div class="stat-label">准确率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">245ms</div>
                <div class="stat-label">平均响应时间</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">15,678</div>
                <div class="stat-label">索引文档数</div>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="chat-panel">
                <h3 style="color: #667eea; margin-bottom: 15px;">💬 智能问答</h3>
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai">
                            <strong>AI助手：</strong>您好！我是基于RAG的智能问答助手。我可以回答关于项目文档、代码示例等问题。请问有什么可以帮助您的？
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="questionInput" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendQuestion()">
                        <button onclick="sendQuestion()">发送</button>
                    </div>
                </div>
            </div>
            
            <div class="sidebar">
                <div class="info-panel">
                    <h3>📚 检索来源</h3>
                    <div id="sourcesList">
                        <div class="source-item">
                            <div class="source-title">RAG_GUIDE.md</div>
                            <div class="source-similarity">相似度: 0.92</div>
                        </div>
                        <div class="source-item">
                            <div class="source-title">rag_system.py</div>
                            <div class="source-similarity">相似度: 0.87</div>
                        </div>
                        <div class="source-item">
                            <div class="source-title">project-structure.md</div>
                            <div class="source-similarity">相似度: 0.81</div>
                        </div>
                    </div>
                </div>
                
                <div class="info-panel">
                    <h3>📊 检索策略对比</h3>
                    <div class="chart-container">
                        <canvas id="retrievalChart"></canvas>
                    </div>
                </div>
                
                <div class="settings-panel">
                    <h3 style="color: #667eea; margin-bottom: 15px;">⚙️ 设置</h3>
                    <div class="setting-item">
                        <label for="retrievalStrategy">检索策略</label>
                        <select id="retrievalStrategy" aria-label="检索策略">
                            <option value="vector">向量检索</option>
                            <option value="keyword">关键词检索</option>
                            <option value="hybrid" selected>混合检索</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="topK">返回结果数</label>
                        <input type="number" id="topK" value="3" min="1" max="10" aria-label="返回结果数">
                    </div>
                    <div class="setting-item">
                        <label for="threshold">相似度阈值</label>
                        <input type="range" id="threshold" min="0" max="1" step="0.1" value="0.7" aria-label="相似度阈值">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Send question to backend
        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const messages = document.getElementById('chatMessages');
            const question = input.value.trim();
            
            if (!question) return;
            
            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = '<strong>您：</strong>' + escapeHtml(question);
            messages.appendChild(userMsg);
            
            // Show loading
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message ai';
            loadingMsg.innerHTML = '<strong>AI助手：</strong>正在检索相关知识...';
            messages.appendChild(loadingMsg);
            messages.scrollTop = messages.scrollHeight;
            
            try {
                // Call backend API (replace with actual endpoint)
                const response = await fetch('/api/rag/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question: question,
                        strategy: document.getElementById('retrievalStrategy').value,
                        top_k: parseInt(document.getElementById('topK').value)
                    })
                });
                
                const data = await response.json();
                
                // Remove loading message
                messages.removeChild(loadingMsg);
                
                // Add AI response
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai';
                aiMsg.innerHTML = `
                    <strong>AI助手：</strong>${escapeHtml(data.answer)}
                    <div style="margin-top: 10px; padding: 10px; background: #e7f3ff; border-radius: 5px;">
                        <strong>参考来源：</strong>
                        <ul style="margin-top: 5px; margin-left: 20px;">
                            ${data.sources.map(s => `<li>${s.document} (相似度: ${s.similarity})</li>`).join('')}
                        </ul>
                    </div>
                `;
                messages.appendChild(aiMsg);
                
                // Update sources list
                updateSourcesList(data.sources);
                
            } catch (error) {
                // For demo purposes, show mock response
                messages.removeChild(loadingMsg);
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai';
                aiMsg.innerHTML = `
                    <strong>AI助手：</strong>这是一个演示响应。在实际应用中，这里会显示基于检索结果的AI回答。<br><br>
                    您的问题：${escapeHtml(question)}
                `;
                messages.appendChild(aiMsg);
            }
            
            input.value = '';
            messages.scrollTop = messages.scrollHeight;
        }
        
        // Update sources list
        function updateSourcesList(sources) {
            const sourcesList = document.getElementById('sourcesList');
            sourcesList.innerHTML = sources.map(source => `
                <div class="source-item">
                    <div class="source-title">${source.document}</div>
                    <div class="source-similarity">相似度: ${source.similarity}</div>
                </div>
            `).join('');
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        // Initialize chart
        window.onload = function() {
            new Chart(document.getElementById('retrievalChart'), {
                type: 'bar',
                data: {
                    labels: ['精准匹配', '语义相似', '关键词', '混合检索'],
                    datasets: [{
                        label: '准确率 (%)',
                        data: [92, 87, 78, 95],
                        backgroundColor: '#667eea'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        };
    </script>
</body>
</html>
